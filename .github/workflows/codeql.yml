name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - uses: github/codeql-action/init@v4
        with:
          languages: csharp
      # Explicit build instead of autobuild to avoid race conditions with GeneratePackageOnBuild.
      # -m:1 forces single-threaded MSBuild — parallel builds race on the same .deps.json
      # file (System.IO.IOException "being used by another process" — affects both Windows
      # and ubuntu runners under load). Same root cause that PR #509 addresses for nightly.
      - name: Build
        run: dotnet build --configuration Release -p:GeneratePackageOnBuild=false -m:1
      - uses: github/codeql-action/analyze@v4
