name: Verify Common Pins (Reusable)

on:
  workflow_call:
    inputs:
      has_private_submodules:
        description: 'Whether the caller plugin has private submodules requiring SUBMODULES_TOKEN'
        type: boolean
        default: false
    secrets:
      SUBMODULES_TOKEN:
        required: false

jobs:
  verify-pins:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: ${{ inputs.has_private_submodules && 'false' || 'recursive' }}
          token: ${{ inputs.has_private_submodules && secrets.SUBMODULES_TOKEN || github.token }}

      - name: Init Common submodule (private)
        if: inputs.has_private_submodules
        env:
          SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
        run: |
          if [ -z "${SUBMODULES_TOKEN}" ]; then
            echo "::error::ERROR: Set SUBMODULES_TOKEN secret (repo Settings > Secrets > Actions)"
            exit 1
          fi
          COMMON_PATH=$(git config -f .gitmodules --get-regexp 'submodule\..*[Ll]idarr\.[Pp]lugin\.[Cc]ommon\.path' | awk '{print $2}')
          echo "Common submodule path: ${COMMON_PATH}"
          git config url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --depth=1 -- "${COMMON_PATH}"
          git config --unset url."https://x-access-token:${SUBMODULES_TOKEN}@github.com/".insteadOf

      - name: Verify submodule pin
        shell: pwsh
        run: |
          $commonPath = if (Test-Path "ext/Lidarr.Plugin.Common") { "ext/Lidarr.Plugin.Common" }
                        else { "ext/lidarr.plugin.common" }
          & "$commonPath/scripts/repin-common-submodule.ps1" -VerifyOnly

      - name: Verify workflow SHA pins
        shell: pwsh
        run: |
          $commonPath = if (Test-Path "ext/Lidarr.Plugin.Common") { "ext/Lidarr.Plugin.Common" }
                        else { "ext/lidarr.plugin.common" }
          & "$commonPath/scripts/lint-workflow-sha-pins.ps1" -Path . -Mode ci

      - name: Check workflow SHA pins match ext-common-sha.txt (advisory)
        continue-on-error: true
        shell: pwsh
        run: |
          $expectedSha = (Get-Content 'ext-common-sha.txt' -Raw).Trim()
          if (-not $expectedSha) { Write-Warning 'ext-common-sha.txt is empty'; exit 0 }

          $stale = @()
          Get-ChildItem '.github/workflows/*.yml' -ErrorAction SilentlyContinue | ForEach-Object {
            $file = $_.Name
            $lines = [IO.File]::ReadAllLines($_.FullName)
            for ($i = 0; $i -lt $lines.Length; $i++) {
              $m = [regex]::Match($lines[$i], '^\s*uses:\s+RicherTunes/Lidarr\.Plugin\.Common/.+@([0-9a-f]{40})')
              if ($m.Success -and $m.Groups[1].Value -ne $expectedSha) {
                $stale += "${file}:$($i+1) pins @$($m.Groups[1].Value.Substring(0,12))..."
              }
            }
          }

          if ($stale.Count -gt 0) {
            $stale | ForEach-Object { Write-Host "::warning::Stale workflow pin: $_" }
            Write-Host "::warning::$($stale.Count) workflow pin(s) differ from ext-common-sha.txt (@$($expectedSha.Substring(0,12))...). Run repin-common-submodule with --update-pins to fix (requires PAT)."
          } else {
            Write-Host "All Common workflow SHA pins match ext-common-sha.txt ($($expectedSha.Substring(0,12))...)"
          }
