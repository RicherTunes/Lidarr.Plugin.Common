name: CI
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build (Release, warnings-as-errors)
        run: dotnet build src/Lidarr.Plugin.Common.csproj -c Release -warnaserror -p:RunAnalyzersDuringBuild=false -m:1
      - name: Test (full unit suite, excl. quarantined)
        run: dotnet test tests/Lidarr.Plugin.Common.Tests.csproj -c Release --filter "State!=Quarantined"
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Date-parsing gate (culture-safety + epoch guard)
        shell: pwsh
        run: |
          ./scripts/lint-date-parsing.ps1 -SelfTest
          ./scripts/lint-date-parsing.ps1 -Path . -Mode ci
      - name: Sync-over-async gate
        shell: pwsh
        run: |
          ./scripts/lint-sync-over-async.ps1 -SelfTest
          ./scripts/lint-sync-over-async.ps1 -Path . -Mode ci
      - name: Doc script-reference gate (no docs pointing at deleted scripts)
        shell: pwsh
        run: |
          ./scripts/lint-doc-script-refs.ps1 -SelfTest
          ./scripts/lint-doc-script-refs.ps1 -CI
      - name: Ecosystem parity harness self-test
        shell: pwsh
        run: ./scripts/tests/Test-EcosystemParityLint.ps1
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks (secret scan)
        run: |
          set -e
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz -o /tmp/gl.tgz
          tar -xzf /tmp/gl.tgz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-banner --redact --exit-code 1
