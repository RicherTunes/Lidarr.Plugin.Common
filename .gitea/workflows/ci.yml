name: CI
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      # The ManifestCheck/PackagingTarget test fixtures spawn pwsh as a child process;
      # the bare runner image has none (see the lint job's note for why no container).
      - name: Install PowerShell
        shell: bash
        run: |
          set -e
          curl -sSL https://github.com/PowerShell/PowerShell/releases/download/v7.4.6/powershell-7.4.6-linux-x64.tar.gz -o /tmp/pwsh.tgz
          mkdir -p /opt/pwsh
          tar -xzf /tmp/pwsh.tgz -C /opt/pwsh
          chmod +x /opt/pwsh/pwsh
          echo "/opt/pwsh" >> "$GITHUB_PATH"
      - name: Restore
        run: dotnet restore
      # EnableSourceLink=false: Microsoft.SourceLink.GitHub cannot map the Gitea origin
      # (192.168.2.59), so its target emits "source control information is not available"
      # which -warnaserror promotes to a build failure. Verified against a gitea-origin
      # clone: ContinuousIntegrationBuild=false does NOT skip the target; this flag does.
      # This Gitea job is a correctness gate, not a publish pipeline, so no source link
      # is needed here. GitHub-side builds keep SourceLink.
      - name: Build (Release, warnings-as-errors)
        run: dotnet build src/Lidarr.Plugin.Common.csproj -c Release -warnaserror -p:RunAnalyzersDuringBuild=false -p:EnableSourceLink=false -m:1
      # act_runner executes ubuntu-latest jobs inside the configured Docker image.
      # The Docker socket is mounted by the runner, but node:20-bookworm does not
      # ship the docker CLI that LidarrContainerFixture invokes.
      - name: Install Docker CLI
        shell: bash
        run: |
          set -e
          if ! command -v docker >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends docker.io
            rm -rf /var/lib/apt/lists/*
          fi
          docker --version
          docker ps >/dev/null
      - name: Test (full unit suite, excl. quarantined)
        run: dotnet test tests/Lidarr.Plugin.Common.Tests.csproj -c Release --filter "State!=Quarantined" -p:EnableSourceLink=false --blame-hang-timeout 10m
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # The bare runner image has no pwsh and the catthehacker container can't reach Gitea
      # for checkout on this host (the #12 blocker). `dotnet tool install PowerShell` also
      # fails under act_runner (DotnetToolSettings.xml error), so fetch the self-contained
      # release tarball directly — the same pattern the gitleaks job uses.
      - name: Install PowerShell
        shell: bash
        run: |
          set -e
          curl -sSL https://github.com/PowerShell/PowerShell/releases/download/v7.4.6/powershell-7.4.6-linux-x64.tar.gz -o /tmp/pwsh.tgz
          mkdir -p /opt/pwsh
          tar -xzf /tmp/pwsh.tgz -C /opt/pwsh
          chmod +x /opt/pwsh/pwsh
          echo "/opt/pwsh" >> "$GITHUB_PATH"
      # && chaining: a failing self-test must fail the step. Sequential lines mask the
      # first command's exit code (the step reports only the last command's).
      - name: Date-parsing gate (culture-safety + epoch guard)
        shell: pwsh
        run: ./scripts/lint-date-parsing.ps1 -SelfTest && ./scripts/lint-date-parsing.ps1 -Path . -Mode ci
      - name: Sync-over-async gate
        shell: pwsh
        run: ./scripts/lint-sync-over-async.ps1 -SelfTest && ./scripts/lint-sync-over-async.ps1 -Path . -Mode ci
      - name: Doc script-reference gate (no docs pointing at deleted scripts)
        shell: pwsh
        run: ./scripts/lint-doc-script-refs.ps1 -SelfTest -CI && ./scripts/lint-doc-script-refs.ps1 -CI
      - name: Test trait policy gate
        shell: pwsh
        run: ./scripts/lint-test-traits.ps1 -Path . -CI
      - name: Test trait policy self-test
        shell: pwsh
        run: ./scripts/tests/Test-TestTraitPolicy.ps1
      - name: Ecosystem parity harness self-test
        shell: pwsh
        run: ./scripts/tests/Test-EcosystemParityLint.ps1
      - name: Shared plugin lint runner self-test
        shell: pwsh
        run: ./scripts/tests/Test-RunPluginLintGates.ps1
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks (secret scan)
        run: |
          set -euo pipefail
          # Integrity-pin the secret scanner itself: a moved tag or a tampered single
          # asset would otherwise be trusted silently, defeating the scan it performs.
          GITLEAKS_SHA256=ba6dbb656933921c775ee5a2d1c13a91046e7952e9d919f9bac4cec61d628e7d
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz -o /tmp/gl.tgz
          echo "${GITLEAKS_SHA256}  /tmp/gl.tgz" | sha256sum -c -
          tar -xzf /tmp/gl.tgz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-banner --redact --exit-code 1
