name: CI
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore
      # ContinuousIntegrationBuild=false: Microsoft.SourceLink.GitHub cannot resolve the
      # Gitea origin (192.168.2.59), so under the default CI deterministic-source-paths the
      # SourceLink targets hard-error ("source control information is not available") and
      # -warnaserror fails the build. This Gitea job is a correctness gate, not a publish
      # pipeline, so source-link determinism is not needed here.
      - name: Build (Release, warnings-as-errors)
        run: dotnet build src/Lidarr.Plugin.Common.csproj -c Release -warnaserror -p:RunAnalyzersDuringBuild=false -p:ContinuousIntegrationBuild=false -m:1
      - name: Test (full unit suite, excl. quarantined)
        run: dotnet test tests/Lidarr.Plugin.Common.Tests.csproj -c Release --filter "State!=Quarantined" -p:ContinuousIntegrationBuild=false --blame-hang-timeout 10m
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      # The bare runner image has no pwsh and the catthehacker container can't reach Gitea
      # for checkout on this host (the #12 blocker). Installing PowerShell as a dotnet global
      # tool gives pwsh on the runner the gates need, without a container or host config.
      - name: Install PowerShell
        shell: bash
        run: |
          dotnet tool install --global PowerShell
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      # && chaining: a failing self-test must fail the step. Sequential lines mask the
      # first command's exit code (the step reports only the last command's).
      - name: Date-parsing gate (culture-safety + epoch guard)
        shell: pwsh
        run: ./scripts/lint-date-parsing.ps1 -SelfTest && ./scripts/lint-date-parsing.ps1 -Path . -Mode ci
      - name: Sync-over-async gate
        shell: pwsh
        run: ./scripts/lint-sync-over-async.ps1 -SelfTest && ./scripts/lint-sync-over-async.ps1 -Path . -Mode ci
      - name: Doc script-reference gate (no docs pointing at deleted scripts)
        shell: pwsh
        run: ./scripts/lint-doc-script-refs.ps1 -SelfTest -CI && ./scripts/lint-doc-script-refs.ps1 -CI
      - name: Ecosystem parity harness self-test
        shell: pwsh
        run: ./scripts/tests/Test-EcosystemParityLint.ps1
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: gitleaks (secret scan)
        run: |
          set -e
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz -o /tmp/gl.tgz
          tar -xzf /tmp/gl.tgz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-banner --redact --exit-code 1
